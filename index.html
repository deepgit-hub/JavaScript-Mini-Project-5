<html>
    <head>
        <title>Student Report Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
<body>
        <center><br><br><br>
            <div id="input-container">
        <form>
            <table border="1">
                <tr>
                    <th>Name</th>
                    <td><input type="text" id="name-input"></td>
                </tr>
                <tr>
                    <th>Mark</th>
                    <td><input type="number" id="mark-input"></td>
                </tr>
                 <tr>
                    <th>Department</th>
                    <td><select id="department-input">
                        <option>CS</option>
                        <option>BCA</option>
                        <option>MCA</option>
                    </select></td>
                </tr>
                 <tr>
                    <th>Year</th>
                    <td><select id="year-input" class="year">
                        <option>1st</option>
                        <option>2nd</option>
                        <option>3rd</option>
                    </select></td>
                </tr>
                <tr>
                    <th>Attendence Percentage</th>
                    <td><input type="number" id="attendence-input"></td>
                </tr>
                <tr>
                    <th>Late Days</th>
                    <td><input type="number" id="late-input"></td>
                </tr>
                <tr>
                    <th>Medical Certificate</th>
                    <td><select id="medical-input">
                        <option>YES</option>
                        <option>NO</option>
                    </select></td>
                </tr>
            </table>
        </form>
        </div>
     <br>
        <button id="add-student" onclick="addi()" type="button">Add Student</button>
        <br><br><br><br><br> 
        <table id="data-table" border="3">
           <tr> <th>Name</th>
            <th>Mark</th>
            <th>Attendence</th>
            <th>Late Days</th>
            <th>Medical Cert</th>
            </tr>
        </table><br><br><br><br><br>    
        <table id="report-table">
            <tr><th>Total Students \\</th>
            <th>Passed Students</th>
            <th>Failed Students</th>
            <th>Not Eligible Students</th>
            <th>Students With Warning</th>
            <th>Average Mark</th>
            <th>Highest Mark</th>
            <th>Lowest Mark</th></tr>
            
        </table>
        <br><br><br>
        <button id="report" onclick="report()" type="button">Generate Report</button>
        </center>
        <script src="script.js"></script>
    </body>
</html>
